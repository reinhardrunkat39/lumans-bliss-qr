<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>QR Audio PRO</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    body {
      font-family: Kenoky;
      text-align: center;
      padding: 50px;
      color: white;
      background-image: url("BG TAMPILAN QR.jpg");
      background-size: cover;
    }

    .box {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      margin-bottom: 50px;
    }

    #qrcode {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #0b7043;
      color: white;
      cursor: pointer;
    }

    #storage {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-start;
      gap: 20px;
      padding: 20px;
    }

    .song-item {
      background: #40795260;
      color: white;
      padding: 15px;
      border-radius: 10px;
      flex: 1 1 300px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .song-item audio {
      width: 100%;
      margin: 10px 0;
    }

    .song-item .qr {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Storage Audio
  <strong style="color: #30722a;">LUMANS BLISS</strong>
</h1>

<div class="box">
  <input type="file" id="audioFile" accept="audio/*"><br><br>
  <button onclick="uploadAudio()">Upload & Generate QR</button>

  <p id="status"></p>
  <audio id="preview" controls></audio>

  <div id="qrcode"></div>
</div>

<h2>Lagu yang Disimpan</h2>
<div id="storage"></div>

<script>
const CLOUD_NAME = "dw8f4wvjy";
const UPLOAD_PRESET = "audio_uplaod";

let audioURL = "";
let uploadedSongs = JSON.parse(localStorage.getItem('uploadedSongs')) || [];

function displaySongs() {
  const storage = document.getElementById('storage');
  storage.innerHTML = '';
  uploadedSongs.forEach(song => {
    const item = document.createElement('div');
    item.className = 'song-item';
    item.innerHTML = `
      <h3>${song.name}</h3>
      <audio controls src="${song.url}"></audio>
      <div class="qr"></div>
    `;
    storage.appendChild(item);
    new QRCode(item.querySelector('.qr'), {
      text: window.location.origin + "/player.html?audio=" + encodeURIComponent(song.url),
      width: 150,
      height: 150
    });
  });
}

displaySongs();

async function uploadAudio() {
  const file = document.getElementById("audioFile").files[0];
  if (!file) return alert("Boleh sto upload dulu!");

  document.getElementById("status").innerHTML =
  'Uploading... <i class="fa-solid fa-circle-notch fa-spin"></i>';

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);
  formData.append("resource_type", "auto"); // 🔥 FIX PENTING

  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!data.secure_url) {
      throw new Error("Upload gagal");
    }

    audioURL = data.secure_url;

    document.getElementById("preview").src = audioURL;
    document.getElementById("status").innerText = "Upload berhasil ✅";

    generateQR();

    // Add to storage
    uploadedSongs.push({ url: audioURL, name: file.name });
    localStorage.setItem('uploadedSongs', JSON.stringify(uploadedSongs));
    displaySongs();

  } catch (err) {
    document.getElementById("status").innerText = "Error upload ❌";
    console.error(err);
  }
}

function generateQR() {
  if (!audioURL) {
    alert("Audio belum ada!");
    return;
  }

  const playerURL = window.location.origin + "/player.html?audio=" + encodeURIComponent(audioURL);

  document.getElementById("qrcode").innerHTML = "";
  new QRCode(document.getElementById("qrcode"), {
    text: playerURL,
    width: 200,
    height: 200
  });
}
</script>

</body>
</html>
