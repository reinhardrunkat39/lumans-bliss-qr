<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumans Bliss Song</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  background-image: url("BG TAMPILAN QR.jpg");
  background-size: cover;
}

.player-card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.1);
  border-radius: 25px;
  padding: 30px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.cover {
  width: 200px;
  height: 200px;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 50px;
}

.title {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}

.controls {
  margin-top: 20px;
}

button {
  background: white;
  border: none;
  border-radius: 50%;
  width: 60px;
  height: 60px;
  font-size: 20px;
  cursor: pointer;
}

.progress {
  width: 100%;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="player-card">
  <div class="cover">
    <img src="LOGO LUMANS BLISS-FIKS-01.jpg"
          alt="Cover" style="width: 100%; height: 100%; border-radius: 20px;">
  </div>

  <div class="title" id="title">Lumans Bliss Song</div>

  <audio id="audio"></audio>

  <div class="controls">
    <button onclick="togglePlay()">▶</button>
  </div>

  <input type="range" id="progress" class="progress" value="0">
</div>

<script>
const params = new URLSearchParams(window.location.search);
const audioURL = params.get("audio");

const audio = document.getElementById("audio");
const progress = document.getElementById("progress");
const button = document.querySelector("button");

if (audioURL) {
  audio.src = audioURL;
} else {
  document.body.innerHTML = "<h2>Audio tidak ditemukan</h2>";
}

// PLAY / PAUSE
function togglePlay() {
  if (audio.paused) {
    audio.play();
    button.innerText = "▐▐";
  } else {
    audio.pause();
    button.innerText = "▶︎";
  }
}

// UPDATE PROGRESS
audio.addEventListener("timeupdate", () => {
  progress.value = (audio.currentTime / audio.duration) * 100 || 0;
});

// SEEK
progress.addEventListener("input", () => {
  audio.currentTime = (progress.value / 100) * audio.duration;
});
</script>

</body>
</html>
